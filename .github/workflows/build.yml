name: Build Extension

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gnome-shell libglib2.0-bin

      - name: Build extension bundle
        run: make pack

      - name: Append commit hash to bundle name
        id: bundle
        run: |
          short_sha="${GITHUB_SHA::7}"
          bundle="dist/roompanel@friedjof.github.io.shell-extension.zip"
          renamed_bundle="dist/roompanel@friedjof.github.io-${short_sha}.shell-extension.zip"
          mv "${bundle}" "${renamed_bundle}"
          echo "artifact_name=roompanel-shell-extension-${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "bundle_path=${renamed_bundle}" >> "${GITHUB_OUTPUT}"

      - name: Upload extension bundle
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.bundle.outputs.artifact_name }}
          path: ${{ steps.bundle.outputs.bundle_path }}
          if-no-files-found: error

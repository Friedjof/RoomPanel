name: Release Extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Package extension and upload to extensions.gnome.org
        id: ego
        uses: murar8/gnome-extensions-action@0.1.1
        with:
          source-dir: ./hacontrolpanel@friedjof.github.io
          output-dir: ./dist
          schema: ./schemas/org.gnome.shell.extensions.hacontrolpanel.gschema.xml
          username: ${{ secrets.EGO_USERNAME }}
          password: ${{ secrets.EGO_PASSWORD }}
          accept-tos: true
          force: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" "${{ steps.ego.outputs.zip-file }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "HAControlPanel ${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag

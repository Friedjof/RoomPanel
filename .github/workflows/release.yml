name: Release Extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build extension ZIP
        run: |
          mkdir -p dist
          cd hacontrolpanel@friedjof.github.io
          zip -r ../dist/hacontrolpanel@friedjof.github.io-${GITHUB_REF_NAME}.shell-extension.zip \
            extension.js prefs.js stylesheet.css metadata.json \
            lib/ ui/ prefs/ schemas/

      - name: Upload to extensions.gnome.org
        uses: murar8/gnome-extensions-action@0.1.1
        with:
          source-dir: ./hacontrolpanel@friedjof.github.io
          output-dir: ./dist
          schema: ./schemas/org.gnome.shell.extensions.hacontrolpanel.gschema.xml
          username: ${{ secrets.EGO_USERNAME }}
          password: ${{ secrets.EGO_PASSWORD }}
          accept-tos: true
          force: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ZIP_NAME="hacontrolpanel@friedjof.github.io-${GITHUB_REF_NAME}.shell-extension.zip"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "${PREV_TAG}..HEAD" --oneline | sed 's/^/- /')
            RANGE_HINT="since \`${PREV_TAG}\`"
          else
            CHANGES=$(git log --oneline | head -20 | sed 's/^/- /')
            RANGE_HINT="(initial release)"
          fi

          LAST_3=$(git log -3 --pretty=format:"- **%s** (\`%h\`) — %an")

          {
            echo "## What's changed ${RANGE_HINT}"
            echo ""
            echo "${CHANGES}"
            echo ""
            echo "### Last 3 commits"
            echo ""
            echo "${LAST_3}"
            echo ""
            echo "---"
            echo ""
            echo "## Installation"
            echo ""
            echo "1. Download \`${ZIP_NAME}\` below"
            echo "2. Install the extension:"
            echo '   ```bash'
            echo "   gnome-extensions install ${ZIP_NAME}"
            echo '   ```'
            echo "3. Enable the extension:"
            echo '   ```bash'
            echo "   gnome-extensions enable hacontrolpanel@friedjof.github.io"
            echo '   ```'
            echo "4. Log out and log back in (required on Wayland)"
            echo ""
            echo "## Update (existing installation)"
            echo ""
            echo "1. Download \`${ZIP_NAME}\` below"
            echo "2. Overwrite the existing installation:"
            echo '   ```bash'
            echo "   gnome-extensions install --force ${ZIP_NAME}"
            echo '   ```'
            echo "3. Log out and log back in to apply the update"
          } > /tmp/release_notes.md

          gh release create "${GITHUB_REF_NAME}" \
            "dist/${ZIP_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "HAControlPanel ${GITHUB_REF_NAME}" \
            --notes-file /tmp/release_notes.md \
            --verify-tag
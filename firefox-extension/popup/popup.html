<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HAControlPanel Bridge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      min-width: 320px;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 12px;
    }

    h1 {
      font-size: 13px;
      font-weight: 600;
      color: #cba6f7;
      margin-bottom: 10px;
      letter-spacing: 0.03em;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #313244;
    }
    .row:last-child { border-bottom: none; }

    .section-title {
      margin-top: 12px;
      margin-bottom: 8px;
      color: #a6adc8;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .label {
      flex: 1;
      color: #a6adc8;
      font-size: 12px;
    }

    .value {
      font-size: 12px;
      color: #cdd6f4;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: right;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-green  { background: #a6e3a1; }
    .dot-red    { background: #f38ba8; }
    .dot-yellow { background: #f9e2af; }
    .dot-gray   { background: #585b70; }
    .dot-orange { background: #fab387; }

    .swatch {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1px solid #313244;
      flex-shrink: 0;
    }

    .tab-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 320px;
      overflow-y: auto;
      padding-right: 2px;
    }

    .tab-card {
      display: grid;
      grid-template-columns: 18px 1fr auto;
      gap: 10px;
      align-items: start;
      padding: 9px 10px;
      border: 1px solid #313244;
      border-radius: 10px;
      background: #181825;
    }

    .tab-card.selected {
      border-color: #89b4fa;
      box-shadow: inset 0 0 0 1px rgba(137, 180, 250, 0.2);
    }

    .tab-main {
      min-width: 0;
    }

    .tab-title {
      font-size: 12px;
      font-weight: 600;
      color: #eef1ff;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 5px;
    }

    .tab-meta {
      font-size: 11px;
      color: #bac2de;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 18px;
      padding: 0 6px;
      border-radius: 999px;
      background: #313244;
      color: #cdd6f4;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .badge-blue { background: #1e3a5f; color: #89dceb; }
    .badge-green { background: #253f2e; color: #a6e3a1; }
    .badge-yellow { background: #4c3a10; color: #f9e2af; }
    .badge-gray { background: #313244; color: #bac2de; }
    .badge-red { background: #4b1f2a; color: #f38ba8; }

    .tab-side {
      text-align: right;
      min-width: 76px;
    }

    .tab-color {
      font-size: 11px;
      font-weight: 700;
      color: #eef1ff;
    }

    .tab-age {
      margin-top: 4px;
      font-size: 10px;
      color: #9399b2;
    }

    .empty {
      padding: 14px 10px;
      border: 1px dashed #313244;
      border-radius: 10px;
      color: #9399b2;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>HAControlPanel Bridge</h1>

  <div class="row">
    <span class="dot" id="connDot"></span>
    <span class="label">GNOME Extension</span>
    <span class="value" id="connStatus">–</span>
  </div>

  <div class="row">
    <span class="dot" id="ytDot"></span>
    <span class="label">YouTube Tabs</span>
    <span class="value" id="ytStatus">–</span>
  </div>

  <div class="row">
    <span class="swatch" id="colorSwatch"></span>
    <span class="label">Last Color</span>
    <span class="value" id="colorValue">–</span>
  </div>

  <div class="row">
    <span class="dot dot-gray"></span>
    <span class="label">Selected Source</span>
    <span class="value" id="selectedSource">–</span>
  </div>

  <div class="row">
    <span class="dot" id="frameDot"></span>
    <span class="label">Frame Input</span>
    <span class="value" id="frameStatus">–</span>
  </div>

  <div class="section-title">Tab Diagnostics</div>
  <div class="tab-list" id="tabList">
    <div class="empty">Loading…</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
